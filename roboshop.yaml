- name: create ec2 and r53 records
  hosts: all
  connection: local
  vars:
    sg_id: sg-07de29797df730215
    ami_id: "ami-0220d79f3f480ecf5"
    env: "dev"
    instances:
     - mangodb
     - catalogue
  tasks:
    - name: create ec2 instance
      amazon.aws.ec2_instance:
        instance_type: t3.micro
        image_id: "{{ ami_id }}"
        region: us-east-1
        security_groups: "{{ sg_id }}"
        name: "{{ item }}-{{ env }}"
        tags:
          Project: "roboshop"
          Environment: "{{ env }}"
          Component: "{{ item }}"
          Name: "{{ item }}-{{ env }}"
      loop: "{{ instances }}"
      register: ec2_output

    - name: print the ec2_output
      ansible.builtin.debug:
        msg: "{{ ec2_output }}"  
